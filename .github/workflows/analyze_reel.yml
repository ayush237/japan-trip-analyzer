name: Analyze New Reel
on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  analyze_and_deploy:
    if: contains(github.event.issue.labels.*.name, 'analyze-reel')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-generativeai beautifulsoup4

      - name: Run analysis script
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python action_main.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m "Auto-add new reel from issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          git push

      - name: Close Issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "✅ Successfully analyzed the reel and updated the live website!"
